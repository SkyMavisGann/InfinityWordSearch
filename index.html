<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Word Search</title>
  <link rel="stylesheet" href="static/styles.css">
  <style>
    
  </style>
</head>
<body>
  <header>
    <h1>Infinity Word Search</h1>
  </header>
  <main class="app-shell">
    <section class="gameplay" aria-labelledby="gameplay-title">
      <div class="controls">
        <div>
          <p id="gameplay-title" style="margin: 0; font-size: 1rem; font-weight: 700;">Gameplay</p>
          <p style="margin: 4px 0 0; color: #475569; font-size: 0.92rem;">Use the mouse wheel to zoom around the cursor. Click and drag to pan the grid.</p>
        </div>
      </div>
      <div class="grid-wrapper" id="grid-scroll-area">
        <div class="grid-container" id="wordsearch-grid" data-scale="1">
          <!-- Will fill with grid -->
        </div>
      </div>
    </section>

    <aside class="word-bank" aria-labelledby="word-bank-title">
      <h2 id="word-bank-title">Word Bank</h2>
      <p style="color:#475569; margin-top:0; margin-bottom:16px;">Find the words listed below in the grid.</p>
      <ul class="word-list" id="word-list">
        <li>INFINITY</li>
        <li>SEARCH</li>
        <li>PUZZLE</li>
        <li>GRID</li>
        <li>WORD</li>
        <li>FUN</li>
      </ul>
    </aside>
  </main>

  <script>
    const gridWrapper = document.getElementById('grid-scroll-area');
    const gridContainer = document.getElementById('wordsearch-grid');

    gridContainer.style.transformOrigin = '0 0';

    let scale = 1;
    const minScale = 0.4;
    const maxScale = 2;
    const zoomStep = 0.1;

    let panX = 0; 
    let panY = 0;

    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startPanX = 0;
    let startPanY = 0;

    function updateCameraTransform() {
        gridContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    gridWrapper.addEventListener('wheel', (event) => {
        event.preventDefault();

        const nextScale = event.deltaY < 0
            ? Math.min(maxScale, scale + zoomStep)
            : Math.max(minScale, scale - zoomStep);

        if (nextScale === scale) return;

        // Get mouse position relative to the center of our viewport
        const rect = gridWrapper.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const offsetX = mouseX - centerX;
        const offsetY = mouseY - centerY;

        // Math to ensure we zoom in towards the mouse cursor, not just the center
        const scaleRatio = nextScale / scale;
        panX = offsetX - (offsetX - panX) * scaleRatio;
        panY = offsetY - (offsetY - panY) * scaleRatio;

        scale = nextScale;
        updateCameraTransform();
    }, { passive: false });

    // --- Panning Logic ---
    gridWrapper.addEventListener('pointerdown', (event) => {
        if (event.button !== 0) return; // Only left click

        isDragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        
        // Store where the camera was when we started dragging
        startPanX = panX;
        startPanY = panY;

        gridWrapper.setPointerCapture(event.pointerId);
        
    });

    gridWrapper.addEventListener('pointermove', (event) => {
        if (!isDragging) return;

        // Calculate how far the mouse has moved
        const deltaX = event.clientX - dragStartX;
        const deltaY = event.clientY - dragStartY;

        // Apply that delta to our camera position
        panX = startPanX + deltaX;
        panY = startPanY + deltaY;
        document.body.classList.add('is-dragging');
        updateCameraTransform();
    });

    gridWrapper.addEventListener('pointerup', (event) => {
        isDragging = false;
        gridWrapper.releasePointerCapture(event.pointerId);
        document.body.classList.remove('is-dragging');
    });

    gridWrapper.addEventListener('pointercancel', () => {
        isDragging = false;
        document.body.classList.remove('is-dragging');
    });
    updateCameraTransform();


    const cellSize = 40;
    const container = document.getElementById('wordsearch-grid');

    class GridCell {
        constructor(x, y, letter) {
            this.x = x;
            this.y = y;
            this.letter = letter;
            this.domElement = null; // We will store the HTML <button> reference here later
        }

        render() {
            const btn = document.createElement('button');
            btn.classList.add('grid-cell');
            btn.textContent = this.letter;

            btn.style.left = `${this.x * cellSize}px`;
            btn.style.top = `${this.y * cellSize}px`;

            this.domElement = btn;
            return btn;
        }
    }
    

    const gameState = new Map();
    function generateLevelData() {
        
        gameState.set("0,0", new GridCell(0, 0, "I"));
        gameState.set("1,0", new GridCell(1, 0, "N"));
        gameState.set("2,0", new GridCell(2, 0, "F"));
        
        
        gameState.set("-1,0", new GridCell(-1, 0, "W"));
        gameState.set("-1,1", new GridCell(-1, 1, "O"));
        gameState.set("-1,2", new GridCell(-1, 2, "R"));
        gameState.set("-1,3", new GridCell(-1, 3, "D"));
    }
    
    function renderAllCells() {
        container.innerHTML = '';

        gameState.forEach((cellData, coordinateKey) => {
            const element = cellData.render();
            container.appendChild(element);
        });
    }

    function initializeGame() {
      generateLevelData();
      renderAllCells();
    }

    initializeGame();
  </script>
</body>
</html>
